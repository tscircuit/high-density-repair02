="285.5561250640697" cy="378.98513582778065" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-0.19999999999999996" data-y="0.2" cx="308.5187083546899" cy="378.98513582778065" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0.20000000000000007" data-y="0.2" cx="331.4812916453101" cy="378.98513582778065" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0.6000000000000001" data-y="0.2" cx="354.4438749359303" cy="378.98513582778065" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="0.6000000000000001" data-y="0.2" cx="354.4438749359303" cy="378.98513582778065" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="0.6000000000000001" data-y="-0.2" cx="354.4438749359303" cy="401.9477191184008" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="0.6000000000000001" data-y="-0.6000000000000001" cx="354.4438749359303" cy="424.910302409021" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="1" data-y="-1" cx="377.4064582265505" cy="447.8728856996412" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="1" data-y="-1.4" cx="377.4064582265505" cy="470.8354689902614" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="1" data-y="-1.4" cx="377.4064582265505" cy="470.8354689902614" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="1.4986000000000002" data-y="-1.5240000000000002" cx="406.02931829830857" cy="477.9538698103537" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":57.406458226550484,"c":0,"e":320,"b":0,"d":-57.406458226550484,"f":390.46642747309073};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>