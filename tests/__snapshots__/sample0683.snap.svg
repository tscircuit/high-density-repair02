></g><g><circle data-type="point" data-label="" data-x="-12.7" data-y="-7.299999999999999" cx="170.04184100418433" cy="599.9999999999998" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.8" data-y="-7.299999999999999" cx="151.2970711297071" cy="599.9999999999998" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.8" data-y="-5.299999999999999" cx="151.2970711297071" cy="225.10460251046015" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.700000000000001" data-y="-5.299999999999999" cx="170.04184100418388" cy="225.10460251046015" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.700000000000001" data-y="-5.099999999999999" cx="170.04184100418388" cy="187.61506276150612" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.500000000000002" data-y="-4.899999999999999" cx="207.53138075313746" cy="150.1255230125521" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.4" data-y="-4.9" cx="226.2761506276147" cy="150.12552301255243" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.4" data-y="-4.3125" cx="226.2761506276147" cy="40.000000000000114" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-11.8" data-y="-6" cx="338.7447698744768" cy="356.31799163179926" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.2" data-y="-6" cx="263.7656903765692" cy="356.31799163179926" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.2" data-y="-7.299999999999999" cx="263.7656903765692" cy="599.9999999999998" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-12.100000000000001" data-y="-7.299999999999999" cx="282.5104602510455" cy="599.9999999999998" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":187.44769874476984,"c":0,"e":2550.627615062761,"b":0,"d":-187.44769874476984,"f":-768.3682008368198};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>