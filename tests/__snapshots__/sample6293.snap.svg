" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="2.832967527279848"/></g><g><polyline data-points="-18.02327420061288,-26.563899438159396 -17.069822601838645,-26.563899438159396" data-type="line" data-label="grid:h" points="252.47256454598846,351.34675916141487 387.52743545401154,351.34675916141487" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="2.832967527279848"/></g><g><polyline data-points="-18.02327420061288,-26.363899438159397 -17.069822601838645,-26.363899438159397" data-type="line" data-label="grid:h" points="252.47256454598846,323.0170838886165 387.52743545401154,323.0170838886165" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="2.832967527279848"/></g><g><polyline data-points="-18.02327420061288,-26.163899438159397 -17.069822601838645,-26.163899438159397" data-type="line" data-label="grid:h" points="252.47256454598846,294.6874086158182 387.52743545401154,294.6874086158182" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="2.832967527279848"/></g><g><polyline data-points="-18.02327420061288,-25.963899438159398 -17.069822601838645,-25.963899438159398" data-type="line" data-label="grid:h" points="252.47256454598846,266.35773334301985 387.52743545401154,266.35773334301985" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="2.832967527279848"/></g><g><rect data-type="rect" data-label="cmn_124" data-x="-17.546548401225763" data-y="-26.342599625439597" x="252.47256454598846" y="260.32356556578634" width="135.05487090802308" height="119.35286886842687" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.00705973499781113"/></g><g><rect data-type="rect" data-label="obstacle:oval:0" data-x="-18.77327420061288" data-y="-26.6712998127198" x="39.999999999999545" y="260.32356556578634" width="212.47256454598892" height="212.47256454598846" fill="rgba(168, 85, 247, 0.12)" stroke="#a855f7" stroke-width="0.00705973499781113"/></g><g><rect data-type="rect" data-label="obstacle:oval:1" data-x="-16.31982260183865" data-y="-26.013899438159395" x="387.5274354540111" y="167.20386988822474" width="212.47256454598846" height="212.47256454598846" fill="rgba(168, 85, 247, 0.12)" stroke="#a855f7" stroke-width="0.00705973499781113"/></g><g><rect data-type="rect" data-label="boundary-hit:0:0" data-x="-18.02327420061288" data-y="-26.451399438159395" x="239.72421067322875" y="321.2464791840662" width="25.49670774551896" height="28.329675272798795" fill="rgba(250, 204, 21, 0.45)" stroke="#b45309" stroke-width="0.00705973499781113"/></g><g><circle data-type="point" data-label="source_net_7_mst1" data-x="-18.02327420061288" data-y="-26.538899438159394" cx="252.47256454598846" cy="347.8055497523151" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_7_mst1" data-x="-17.546548401225763" data-y="-25.9212998127198" cx="320" cy="260.32356556578634" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-18.02327420061288" data-y="-26.538899438159394" cx="252.47256454598846" cy="347.8055497523151" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-18.02327420061288" data-y="-26.363899438159397" cx="252.47256454598846" cy="323.0170838886165" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-17.546548401225763" data-y="-26.363899438159397" cx="320" cy="323.0170838886165" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-17.546548401225763" data-y="-25.9212998127198" cx="320" cy="260.32356556578634" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":141.64837636399238,"c":0,"e":2805.4400918258357,"b":0,"d":-141.64837636399238,"f":-3411.386466150233};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>