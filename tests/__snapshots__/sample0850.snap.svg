label="" data-x="8.2" data-y="-5.721299812719799" cx="348.32967527279834" cy="286.85071882546436" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.2" data-y="-5.921299812719799" cx="348.32967527279834" cy="315.1803940982629" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.2" data-y="-6.1212998127197995" cx="348.32967527279834" cy="343.5100693710614" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.2" data-y="-6.3212998127198" cx="348.32967527279834" cy="371.83974464385994" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.2" data-y="-6.5212998127198" cx="348.32967527279834" cy="400.1694199166584" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.399999999999999" data-y="-6.7212998127198" cx="376.6593505455967" cy="428.49909518945697" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8.476725799387117" data-y="-6.75" cx="387.5274354540113" cy="432.5644301190397" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":141.64837636399238,"c":0,"e":-813.1870109119391,"b":0,"d":-141.64837636399238,"f":-523.5621103379088};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>