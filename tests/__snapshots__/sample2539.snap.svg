23, 42, 0.14)" stroke-width="3.3185185185185198"/></g><g><rect data-type="rect" data-label="new-cmn_1-4" data-x="-9.599999999999998" data-y="1.1124999999999994" x="40" y="203.85185185185193" width="389.9259259259263" height="29.03703703703701" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.006026785714285712"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-7.9125" data-y="0.5" x="429.92592592592587" y="203.85185185185182" width="170.07407407407413" height="232.29629629629633" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.006026785714285712"/></g><g><circle data-type="point" data-label="source_net_14_mst0" data-x="-9.599999999999998" data-y="1.1999999999999993" cx="234.96296296296305" cy="203.85185185185193" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_14_mst0" data-x="-9.599999999999998" data-y="1.0249999999999997" cx="234.96296296296305" cy="232.8888888888889" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-9.599999999999998" data-y="1.1999999999999993" cx="234.96296296296305" cy="203.85185185185193" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-9.599999999999998" data-y="1.0249999999999995" cx="234.96296296296305" cy="232.88888888888894" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":165.92592592592598,"c":0,"e":1827.8518518518522,"b":0,"d":-165.92592592592598,"f":402.962962962963};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>