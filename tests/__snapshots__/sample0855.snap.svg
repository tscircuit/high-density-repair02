"point" data-label="" data-x="8.26" data-y="4.75" cx="356.0396039603961" cy="216.039603960396" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.74" data-y="4.75" cx="283.9603960396039" cy="216.039603960396" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.480008000000001" data-y="4.35" cx="247.92190099009918" cy="271.4851485148515" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.49" data-y="4.2" cx="249.30693069306926" cy="292.2772277227723" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.480008000000001" data-y="4" cx="247.92190099009918" cy="320" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.49" data-y="4.2" cx="249.30693069306926" cy="292.2772277227723" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.480008000000001" data-y="4" cx="247.92190099009918" cy="320" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.49" data-y="3.8" cx="249.30693069306926" cy="347.7227722772277" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.480008000000001" data-y="3.9999999999999996" cx="247.92190099009918" cy="320.0000000000001" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="3.7999999999999994" cx="278.41584158415844" cy="347.7227722772278" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.74" data-y="3.25" cx="283.9603960396039" cy="423.960396039604" r="3" fill="#0000FF"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":138.61386138613864,"c":0,"e":-788.9108910891091,"b":0,"d":-138.61386138613864,"f":874.4554455445545};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>