00000000001" cx="361.5841584158418" cy="342.5247524752474" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="8.3" data-y="4.1000000000000005" cx="361.5841584158418" cy="314.8019801980197" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="8.3" data-y="4.300000000000001" cx="361.5841584158418" cy="287.079207920792" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="8.3" data-y="4.500000000000001" cx="361.5841584158418" cy="259.35643564356417" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="8.26" data-y="4.75" cx="356.0396039603961" cy="224.70297029702965" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.74" data-y="4.75" cx="283.9603960396039" cy="224.70297029702965" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="4.800000000000001" cx="278.41584158415844" cy="217.7722772277226" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="4.6000000000000005" cx="278.41584158415844" cy="245.49504950495043" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="4.4" cx="278.41584158415844" cy="273.21782178217813" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="4.2" cx="278.41584158415844" cy="300.94059405940595" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="4" cx="278.41584158415844" cy="328.66336633663366" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="3.8" cx="278.41584158415844" cy="356.38613861386136" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="3.5999999999999996" cx="278.41584158415844" cy="384.1089108910892" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.7" data-y="3.3999999999999995" cx="278.41584158415844" cy="411.8316831683169" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.74" data-y="3.25" cx="283.9603960396039" cy="432.62376237623766" r="3" fill="#0000FF"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":138.61386138613864,"c":0,"e":-788.9108910891091,"b":0,"d":-138.61386138613864,"f":883.1188118811882};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>