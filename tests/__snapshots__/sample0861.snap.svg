, 0.32)" stroke="#059669" stroke-width="0.007214285714285715"/></g><g><circle data-type="point" data-label="source_net_15_mst0" data-x="4.940000000000001" data-y="3.825" cx="247.920792079208" cy="356.38613861386136" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_15_mst0" data-x="5.200000000000001" data-y="4.75" cx="283.960396039604" cy="228.16831683168311" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_6_mst2" data-x="5.460000000000001" data-y="3.25" cx="320" cy="436.08910891089107" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_6_mst2" data-x="5.720000000000001" data-y="4.75" cx="356.039603960396" cy="228.16831683168311" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="5.460000000000001" data-y="3.25" cx="320" cy="436.08910891089107" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.5" data-y="3.65" cx="325.54455445544545" cy="380.64356435643566" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="3.65" cx="336.6336633663366" cy="380.64356435643566" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="3.7000000000000006" cx="336.6336633663366" cy="373.71287128712856" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="3.900000000000001" cx="336.6336633663366" cy="345.99009900990086" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="4.1000000000000005" cx="336.6336633663366" cy="318.26732673267315" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="4.300000000000001" cx="336.6336633663366" cy="290.54455445544545" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.58" data-y="4.35" cx="336.6336633663366" cy="283.61386138613864" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.720000000000001" data-y="4.75" cx="356.039603960396" cy="228.16831683168311" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="4.940000000000001" data-y="3.825" cx="247.920792079208" cy="356.38613861386136" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.340000000000002" data-y="3.8000000000000003" cx="303.36633663366354" cy="359.8514851485148" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.340000000000002" data-y="4" cx="303.36633663366354" cy="332.1287128712871" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.340000000000002" data-y="4.2" cx="303.36633663366354" cy="304.4059405940594" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.340000000000002" data-y="4.35" cx="303.36633663366354" cy="283.61386138613864" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="5.200000000000001" data-y="4.75" cx="283.960396039604" cy="228.16831683168311" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":138.6138613861386,"c":0,"e":-436.8316831683169,"b":0,"d":-138.6138613861386,"f":886.5841584158416};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>