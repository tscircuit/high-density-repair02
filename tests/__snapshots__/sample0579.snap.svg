<circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-3.8499999999999943" cx="273.5095812138528" cy="381.10403456205097" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-3.899999999999994" cx="273.5095812138528" cy="385.00620165842054" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-3.949999999999994" cx="273.5095812138528" cy="388.9083687547901" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-3.999999999999994" cx="273.5095812138528" cy="392.81053585115967" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-4.049999999999994" cx="273.5095812138528" cy="396.71270294752935" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-4.099999999999993" cx="273.5095812138528" cy="400.6148700438989" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.2499999999999996" data-y="-4.149999999999993" cx="273.5095812138528" cy="404.5170371402685" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.1999999999999997" data-y="-4.199999999999993" cx="277.4117483102224" cy="408.41920423663805" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.749" data-y="-4.2126" cx="312.60929551947606" cy="409.4025503449237" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":78.04334192739181,"c":0,"e":527.1504424778761,"b":0,"d":-78.04334192739181,"f":80.63716814159298};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>