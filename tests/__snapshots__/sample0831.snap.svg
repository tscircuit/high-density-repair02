="245.88235294117612" cy="525.8823529411764" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.4" data-y="11.200000000000001" cx="239.019607843137" cy="468.2352941176471" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.8" data-y="11.200000000000001" cx="293.9215686274508" cy="468.2352941176471" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.200000000000001" data-y="11.600000000000001" cx="348.8235294117644" cy="413.33333333333326" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.600000000000001" data-y="12.000000000000002" cx="403.7254901960782" cy="358.43137254901944" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.200000000000001" data-y="12.400000000000002" cx="348.8235294117644" cy="303.5294117647056" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.600000000000001" data-y="12.800000000000002" cx="403.7254901960782" cy="248.6274509803918" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.200000000000001" data-y="13.200000000000003" cx="348.8235294117644" cy="193.725490196078" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.600000000000001" data-y="13.200000000000003" cx="403.7254901960782" cy="193.725490196078" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10.510000000000002" data-y="13.68" cx="391.37254901960773" cy="127.8431372549021" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.220000000000002" data-y="12.23" cx="214.31372549019602" cy="326.8627450980391" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.294999999999998" data-y="12.200000000000001" cx="224.60784313725435" cy="330.98039215686276" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.600000000000001" data-y="12.600000000000001" cx="266.4705882352939" cy="276.07843137254895" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.600000000000001" data-y="13.000000000000002" cx="266.4705882352939" cy="221.17647058823513" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.600000000000001" data-y="13.400000000000002" cx="266.4705882352939" cy="166.27450980392132" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="10" data-y="13.68" cx="321.3725490196075" cy="127.8431372549021" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="9.815" data-y="13.68" cx="295.9803921568623" cy="127.8431372549021" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.8" data-y="13.200000000000001" cx="293.9215686274508" cy="193.72549019607845" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.8" data-y="13.200000000000001" cx="293.9215686274508" cy="193.72549019607845" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.8" data-y="12.8" cx="293.9215686274508" cy="248.62745098039204" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.8" data-y="12.4" cx="293.9215686274508" cy="303.52941176470586" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.220000000000002" data-y="12.23" cx="214.31372549019602" cy="326.8627450980391" r="3" fill="#0000FF"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":137.2549019607843,"c":0,"e":-1051.1764705882356,"b":0,"d":-137.2549019607843,"f":2005.4901960784314};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>