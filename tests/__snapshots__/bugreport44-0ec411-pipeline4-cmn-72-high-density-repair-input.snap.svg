t" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-5.776999999999999" data-y="12.05" cx="388.3792048929665" cy="216.02446483180438" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-4.912" data-y="12.375" cx="600" cy="136.51376146789016" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-5.552" data-y="12.003" cx="443.42507645259934" cy="227.52293577981663" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912000000000001" data-y="12.003" cx="599.9999999999998" cy="227.52293577981663" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-5.776999999999999" data-y="12.05" cx="388.3792048929665" cy="216.02446483180438" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912" data-y="12.375" cx="600" cy="136.51376146789016" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":244.6483180428134,"c":0,"e":1801.7125382262993,"b":0,"d":-244.6483180428134,"f":3164.036697247706};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>