<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-5.552,12.003 -4.912,12.003" data-type="line" data-label="original:source_trace_4__source_trace_23__source_net_3_mst0" points="414.77272727272725,234.090909090909 560.2272727272727,234.090909090909" fill="none" stroke="#111111" stroke-width="20.45454545454545"/></g><g><polyline data-points="-5.776999999999999,12.05 -4.912,12.375" data-type="line" data-label="original:source_trace_0__source_trace_1__source_net_4_mst1" points="363.63636363636374,223.409090909091 560.2272727272727,149.5454545454545" fill="none" stroke="#111111" stroke-width="20.45454545454545"/></g><g><polyline data-points="-5.552,12.003 -4.912,12.003" data-type="line" data-label="source_trace_4__source_trace_23__source_net_3_mst0" points="414.77272727272725,234.090909090909 560.2272727272727,234.090909090909" fill="none" stroke="#FF0000" stroke-width="34.09090909090908"/></g><g><polyline data-points="-5.776999999999999,12.05 -4.912,12.375" data-type="line" data-label="source_trace_0__source_trace_1__source_net_4_mst1" points="363.63636363636374,223.409090909091 560.2272727272727,149.5454545454545" fill="none" stroke="#FF0000" stroke-width="34.09090909090908"/></g><g><rect data-type="rect" data-label="cmn_72" data-x="-6.0565" data-y="12.375" x="40.00000000000023" y="75.68181818181847" width="520.2272727272725" height="147.72727272727252" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.004400000000000001"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-6.871" data-y="11.3" x="40" y="223.409090909091" width="150" height="340.90909090909054" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004400000000000001"/></g><g><rect data-type="rect" data-label="obstacle:rect:1" data-x="-5.871" data-y="11.3" x="267.27272727272725" y="223.409090909091" width="150" height="340.90909090909054" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004400000000000001"/></g><g><rect data-type="rect" data-label="obstacle:rect:2" data-x="-5.232" data-y="11.686" x="414.772727272727" y="244.77272727272748" width="145.45454545454572" height="122.72727272727252" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004400000000000001"/></g><g><rect data-type="rect" data-label="boundry-violation:0:0" data-x="-5.231999999999999" data-y="12.003" x="414.77272727272725" y="213.63636363636397" width="145.45454545454572" height="40.90909090909054" fill="rgba(250, 204, 21, 0.45)" stroke="#b45309" stroke-width="0.004400000000000001"/></g><g><rect data-type="rect" data-label="trace-violation:0:s0:1:s0:top" data-x="-5.231999999999999" data-y="12.0265" x="375.0000000000002" y="194.31818181818198" width="224.99999999999977" height="68.86363636363603" fill="rgba(16, 185, 129, 0.32)" stroke="#059669" stroke-width="0.004400000000000001"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-5.776999999999999" data-y="12.05" cx="363.63636363636374" cy="223.409090909091" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-4.912" data-y="12.375" cx="560.2272727272727" cy="149.5454545454545" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-5.552" data-y="12.003" cx="414.77272727272725" cy="234.090909090909" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912" data-y="12.003" cx="560.2272727272727" cy="234.090909090909" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-5.776999999999999" data-y="12.05" cx="363.63636363636374" cy="223.409090909091" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912" data-y="12.375" cx="560.2272727272727" cy="149.5454545454545" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":227.27272727272722,"c":0,"e":1676.5909090909088,"b":0,"d":-227.27272727272722,"f":2962.045454545454};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>