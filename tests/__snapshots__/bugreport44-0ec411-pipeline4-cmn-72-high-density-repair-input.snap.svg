<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-5.552,12.003 -4.912,12.003" data-type="line" data-label="original:source_trace_4__source_trace_23__source_net_3_mst0" points="443.42507645259934,227.52293577981663 599.9999999999998,227.52293577981663" fill="none" stroke="#111111" stroke-width="22.018348623853196"/></g><g><polyline data-points="-5.776999999999999,12.05 -4.912,12.375" data-type="line" data-label="original:source_trace_0__source_trace_1__source_net_4_mst1" points="388.3792048929665,216.02446483180438 599.9999999999998,136.51376146789016" fill="none" stroke="#111111" stroke-width="22.018348623853196"/></g><g><polyline data-points="-5.552,12.003 -4.912,12.003" data-type="line" data-label="source_trace_4__source_trace_23__source_net_3_mst0" points="443.42507645259934,227.52293577981663 599.9999999999998,227.52293577981663" fill="none" stroke="#FF0000" stroke-width="36.69724770642199"/></g><g><polyline data-points="-5.776999999999999,12.05 -4.912,12.375" data-type="line" data-label="source_trace_0__source_trace_1__source_net_4_mst1" points="388.3792048929665,216.02446483180438 599.9999999999998,136.51376146789016" fill="none" stroke="#FF0000" stroke-width="36.69724770642199"/></g><g><rect data-type="rect" data-label="cmn_72" data-x="-6.0565" data-y="12.375" x="40.00000000000023" y="57.003058103975945" width="559.9999999999995" height="159.02140672782843" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.004087500000000003"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-6.871" data-y="11.3" x="40" y="216.02446483180438" width="161.4678899082569" height="366.9724770642197" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004087500000000003"/></g><g><rect data-type="rect" data-label="obstacle:rect:1" data-x="-5.871" data-y="11.3" x="284.64831804281334" y="216.02446483180438" width="161.4678899082569" height="366.9724770642197" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004087500000000003"/></g><g><rect data-type="rect" data-label="obstacle:rect:2" data-x="-5.232" data-y="11.686" x="443.4250764525991" y="239.0214067278289" width="156.57492354740066" height="132.11009174311903" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.004087500000000003"/></g><g><rect data-type="rect" data-label="boundry-violation:0:0" data-x="-5.231999999999999" data-y="12.003" x="443.42507645259934" y="205.50458715596324" width="156.57492354740066" height="44.03669724770634" fill="rgba(250, 204, 21, 0.45)" stroke="#b45309" stroke-width="0.004087500000000003"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-5.776999999999999" data-y="12.05" cx="388.3792048929665" cy="216.02446483180438" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst1" data-x="-4.912" data-y="12.375" cx="599.9999999999998" cy="136.51376146789016" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-5.552" data-y="12.003" cx="443.42507645259934" cy="227.52293577981663" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912" data-y="12.003" cx="599.9999999999998" cy="227.52293577981663" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-5.776999999999999" data-y="12.05" cx="388.3792048929665" cy="216.02446483180438" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.912" data-y="12.375" cx="599.9999999999998" cy="136.51376146789016" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":244.6483180428133,"c":0,"e":1801.7125382262986,"b":0,"d":-244.6483180428133,"f":3164.0366972477045};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>