 width="165.56521739130312" height="560" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.005133928571428572"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-17.825" data-y="0" x="81.39130434782646" y="414.9565217391305" width="155.82608695652107" height="185.0434782608695" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.005133928571428572"/></g><g><rect data-type="rect" data-label="obstacle:rect:1" data-x="-16.175" data-y="0" x="402.782608695652" y="414.9565217391305" width="155.82608695652152" height="185.0434782608695" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.005133928571428572"/></g><g><circle data-type="point" data-label="source_net_4_mst2" data-x="-17" data-y="-0.47499999999999964" cx="320" cy="600" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_4_mst2" data-x="-16.575" data-y="1.4375" cx="402.782608695652" cy="227.47826086956525" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-17" data-y="-0.475" cx="320" cy="600" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-17" data-y="1.4375" cx="320" cy="227.47826086956525" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-16.575" data-y="1.4375" cx="402.782608695652" cy="227.47826086956525" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":194.78260869565216,"c":0,"e":3631.3043478260865,"b":0,"d":-194.78260869565216,"f":507.47826086956525};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>