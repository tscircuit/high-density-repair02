data-y="-10.475" cx="288.5207100591724" cy="169.23076923076906" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="27.8875" data-y="-13.700000000000003" cx="320" cy="596.6863905325445" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="27.8875" data-y="-10.875" cx="320" cy="222.24852071005898" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="27.650000000000006" data-y="-10.875" cx="288.5207100591724" cy="222.24852071005898" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="27.650000000000006" data-y="-10.475" cx="288.5207100591724" cy="169.23076923076906" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":132.54437869822482,"c":0,"e":-3376.3313609467446,"b":0,"d":-132.54437869822482,"f":-1219.171597633136};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>