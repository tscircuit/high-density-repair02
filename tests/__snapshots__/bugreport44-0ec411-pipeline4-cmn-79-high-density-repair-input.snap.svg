999999999999" cx="566.653749884172" cy="283.46858369622487" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.1750000000000003" data-y="8.849999999999998" cx="566.653749884172" cy="296.8012173837333" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.1250000000000004" data-y="8.799999999999997" cx="579.9863835716806" cy="310.13385107124213" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.0750000000000006" data-y="8.799999999999997" cx="593.3190172591891" cy="310.13385107124213" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.0499450500000265" data-y="8.762999999999998" cx="599.999986667359" cy="319.9999999999982" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.57505879999997" data-y="8.99800089999999" cx="459.9770012068948" cy="257.33638168130346" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.4599499999999996" data-y="8.961500399999991" cx="224.0183967488889" cy="267.06933759952153" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":266.6526737501718,"c":0,"e":1146.6233152907957,"b":0,"d":-266.6526737501718,"f":2656.6773800727533};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>