><g><rect data-type="rect" data-label="cmn_79" data-x="-2.7549474999999997" data-y="8.762999999999998" x="224.0183967488889" y="257.33635501603385" width="375.981603251111" height="125.32728996792866" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.003750196785714232"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-3.099943000000053" data-y="8.128" x="40.0304784005873" y="382.6635916534274" width="559.969494934131" height="213.3217123558593" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.003750196785714232"/></g><g><rect data-type="rect" data-label="obstacle:rect:1" data-x="-3.2500569999999698" data-y="9.397999999999982" x="40" y="44.01469599071379" width="479.9738528006835" height="213.3217123558593" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.003750196785714232"/></g><g><circle data-type="point" data-label="source_trace_4__source_trace_23__source_net_3_mst6" data-x="-2.57505879999997" data-y="8.99800089999999" cx="459.9770012068948" cy="257.33638168130346" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_4__source_trace_23__source_net_3_mst6" data-x="-3.4599499999999996" data-y="8.961500399999991" cx="224.0183967488889" cy="267.06933759952153" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst2" data-x="-2.282557899999985" data-y="8.998000999999999" cx="537.9731482662224" cy="257.33635501603385" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_trace_0__source_trace_1__source_net_4_mst2" data-x="-2.0499450500000265" data-y="8.762999999999998" cx="599.999986667359" cy="319.9999999999982" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-2.282557899999985" data-y="8.998000999999999" cx="537.9731482662224" cy="257.33635501603385" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.275" data-y="8.798001" cx="539.9884825091549" cy="310.6668897660684" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.2499529999999996" data-y="8.798001" cx="546.6673320285755" cy="310.6668897660684" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.0499449999999997" data-y="8.762999999999998" cx="599.9999999999999" cy="319.9999999999982" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-2.57505879999997" data-y="8.998000999999999" cx="459.9770012068948" cy="257.33635501603385" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.4599499999999996" data-y="8.961500399999991" cx="224.0183967488889" cy="267.06933759952153" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":266.6526737501718,"c":0,"e":1146.6233152907957,"b":0,"d":-266.6526737501718,"f":2656.6773800727533};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>