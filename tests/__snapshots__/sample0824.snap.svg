" data-label="" data-x="16.200000000000003" data-y="-4.6" cx="346.2505267827015" cy="531.5711348059028" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="16.36360389693211" data-y="-5.371231060122938" cx="354.85191215955524" cy="572.1181858670999" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="17.471396103067892" data-y="-5" cx="413.0934813466464" cy="552.60091597407" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="17.000000000000004" data-y="-4.6" cx="388.3100891190354" cy="531.5711348059028" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="17.000000000000004" data-y="-4.199999999999999" cx="388.3100891190354" cy="510.54135363773594" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="16.600000000000005" data-y="-3.7999999999999994" cx="367.2803079508685" cy="489.51157246956893" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="16.200000000000006" data-y="-3.3999999999999995" cx="346.2505267827016" cy="468.481791301402" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="15.800000000000006" data-y="-2.9999999999999996" cx="325.2207456145346" cy="447.45201013323504" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="15.400000000000006" data-y="-2.5999999999999996" cx="304.19096444636773" cy="426.42222896506803" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="15.000000000000005" data-y="-2.1999999999999997" cx="283.1611832782007" cy="405.3924477969011" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="14.600000000000005" data-y="-1.7999999999999998" cx="262.1314021100337" cy="384.36266662873413" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="14.200000000000005" data-y="-1.4" cx="241.1016209418667" cy="363.3328854605672" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="14.200000000000005" data-y="-0.9999999999999999" cx="241.1016209418667" cy="342.3031042924002" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="13.795710678118656" data-y="-1.0606155300614697" cx="219.8463310223883" cy="345.48993262386307" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":52.57445292041742,"c":0,"e":-505.4556105280609,"b":0,"d":-52.57445292041742,"f":289.7286513719828};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>