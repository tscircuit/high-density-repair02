7323943678" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-38.80000000000001" data-y="8.399999999999999" cx="335.6103286384973" cy="186.76995305164337" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-38.80000000000001" data-y="7.999999999999998" cx="335.6103286384973" cy="213.06103286384996" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-38.40000000000001" data-y="7.599999999999998" cx="361.9014084507039" cy="239.35211267605655" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-38.000000000000014" data-y="7.1999999999999975" cx="388.1924882629105" cy="265.64319248826314" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-38.000000000000014" data-y="6.799999999999997" cx="388.1924882629105" cy="291.93427230046973" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-37.600000000000016" data-y="6.399999999999997" cx="414.48356807511664" cy="318.2253521126763" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-37.600000000000016" data-y="5.9999999999999964" cx="414.48356807511664" cy="344.51643192488297" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-37.600000000000016" data-y="5.599999999999996" cx="414.48356807511664" cy="370.80751173708956" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-37.600000000000016" data-y="5.199999999999996" cx="414.48356807511664" cy="397.09859154929615" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-37.275000000000006" data-y="5.133000000000001" cx="435.8450704225352" cy="401.5023474178404" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":65.72769953051643,"c":0,"e":2885.8450704225356,"b":0,"d":-65.72769953051643,"f":738.8826291079813};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>