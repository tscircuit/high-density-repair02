><g><circle data-type="point" data-label="source_net_10_mst1" data-x="18.01352813742386" data-y="-4.151471862576143" cx="231.00136755637595" cy="278.0296465936166" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="18.01352813742386" data-y="-5" cx="231.00136755637595" cy="300.719697833894" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.425" data-y="-5" cx="242.00432342078625" cy="300.719697833894" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.425" data-y="-4.95" cx="242.00432342078625" cy="299.3826737424381" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.425" data-y="-4.9" cx="242.00432342078625" cy="298.0456496509822" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.475" data-y="-4.8500000000000005" cx="243.34134751224218" cy="296.7086255595264" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.800000000000001" cx="244.67837160369805" cy="295.37160146807054" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.750000000000001" cx="244.67837160369805" cy="294.03457737661466" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.700000000000001" cx="244.67837160369805" cy="292.69755328515885" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.650000000000001" cx="244.67837160369805" cy="291.360529193703" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.600000000000001" cx="244.67837160369805" cy="290.0235051022471" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.550000000000002" cx="244.67837160369805" cy="288.6864810107912" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.500000000000002" cx="244.67837160369805" cy="287.34945691933535" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.450000000000002" cx="244.67837160369805" cy="286.0124328278795" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.400000000000002" cx="244.67837160369805" cy="284.67540873642366" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.350000000000002" cx="244.67837160369805" cy="283.3383846449678" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.3000000000000025" cx="244.67837160369805" cy="282.0013605535119" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.250000000000003" cx="244.67837160369805" cy="280.6643364620561" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.525000000000002" data-y="-4.200000000000003" cx="244.67837160369805" cy="279.3273123706002" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.475" data-y="-4.150000000000003" cx="243.34134751224218" cy="277.99028827914435" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.01352813742386" data-y="-4.151471862576143" cx="231.00136755637595" cy="278.0296465936166" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":26.740481829117332,"c":0,"e":-250.6890542807006,"b":0,"d":-26.740481829117332,"f":167.01728868830733};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>