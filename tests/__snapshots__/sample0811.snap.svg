y="109.41936548336662" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="-15.500000000000002" data-y="-14.1" cx="405.1535345277366" cy="104.87695220080514" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="-15.500000000000002" data-y="-14" cx="405.1535345277366" cy="100.33453891824377" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="-15.500000000000002" data-y="-13.920279579551075" cx="405.1535345277366" cy="96.71330795085794" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="-15.371015510839149" data-y="-13.520279579551076" cx="411.01254309582316" cy="78.54365482061235" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="-19.575" data-y="-19.15833333333333" cx="220.05019326335878" cy="334.6473574103703" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-19.175" data-y="-19.15833333333333" cx="238.21984639360437" cy="334.6473574103703" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-19.175" data-y="-24.51875" cx="238.21984639360437" cy="578.1396360776733" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-14.69926406871193" data-y="-24.51875" cx="441.5262698288078" cy="578.1396360776733" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":45.424132825614215,"c":0,"e":1109.227593324757,"b":0,"d":-45.424132825614215,"f":-535.6033206403553};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>