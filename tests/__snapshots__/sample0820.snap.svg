 cy="263.15638450502144" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="12.200000000000001" data-y="8.600000000000001" cx="85.79626972740311" cy="247.08751793400273" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="12.200000000000001" data-y="9.000000000000002" cx="85.79626972740311" cy="231.0186513629841" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="12.200000000000001" data-y="9.400000000000002" cx="85.79626972740311" cy="214.94978479196544" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="12.200000000000001" data-y="9.800000000000002" cx="85.79626972740311" cy="198.88091822094674" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="12.200000000000001" data-y="9.800000000000002" cx="85.79626972740311" cy="198.88091822094674" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="11.780000000000001" data-y="10" cx="68.92395982783353" cy="190.8464849354375" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="11.780000000000001" data-y="10" cx="68.92395982783353" cy="190.8464849354375" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.39" data-y="7.535" cx="334.4619799139167" cy="289.87087517934" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="18.39" data-y="7.535" cx="334.4619799139167" cy="289.87087517934" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="11.780000000000001" data-y="10" cx="68.92395982783353" cy="190.8464849354375" r="3" fill="#0000FF"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40.17216642754663,"c":0,"e":-404.3041606886658,"b":0,"d":-40.17216642754663,"f":592.5681492109038};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>