<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-10.8,18 -11.3,18" data-type="line" data-label="original:source_net_7_mst0" points="600,320 320,320" fill="none" stroke="#111111" stroke-width="50.4"/></g><g><polyline data-points="-10.8,18 -11.3,18" data-type="line" data-label="source_net_7_mst0" points="600,320 320,320" fill="none" stroke="#FF0000" stroke-width="84"/></g><g><polyline data-points="-11.600000000000001,17.65 -11.600000000000001,18.35" data-type="line" data-label="grid:v" points="151.9999999999991,516 151.9999999999991,124" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.400000000000002,17.65 -11.400000000000002,18.35" data-type="line" data-label="grid:v" points="263.9999999999991,516 263.9999999999991,124" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.200000000000003,17.65 -11.200000000000003,18.35" data-type="line" data-label="grid:v" points="375.9999999999982,516 375.9999999999982,124" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.000000000000004,17.65 -11.000000000000004,18.35" data-type="line" data-label="grid:v" points="487.9999999999982,516 487.9999999999982,124" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.8,17.849999999999998 -10.8,17.849999999999998" data-type="line" data-label="grid:h" points="40,404.0000000000018 600,404.0000000000018" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.8,18.049999999999997 -10.8,18.049999999999997" data-type="line" data-label="grid:h" points="40,292.0000000000018 600,292.0000000000018" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><polyline data-points="-11.8,18.249999999999996 -10.8,18.249999999999996" data-type="line" data-label="grid:h" points="40,180.00000000000182 600,180.00000000000182" fill="none" stroke="rgba(15, 23, 42, 0.14)" stroke-width="11.200000000000001"/></g><g><rect data-type="rect" data-label="cmn_135" data-x="-11.3" data-y="18" x="40" y="124" width="560" height="392" fill="rgba(29, 78, 216, 0.08)" stroke="#1d4ed8" stroke-width="0.0017857142857142857"/></g><g><rect data-type="rect" data-label="obstacle:rect:0" data-x="-11.3" data-y="18" x="40" y="124" width="560" height="392" fill="rgba(220, 38, 38, 0.08)" stroke="#dc2626" stroke-width="0.0017857142857142857"/></g><g><circle data-type="point" data-label="source_net_7_mst0" data-x="-10.8" data-y="18" cx="600" cy="320" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="source_net_7_mst0" data-x="-11.3" data-y="18" cx="320" cy="320" r="3" fill="#0f766e"/></g><g><circle data-type="point" data-label="" data-x="-10.8" data-y="18" cx="600" cy="320" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-11.3" data-y="18" cx="320" cy="320" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":560,"c":0,"e":6648,"b":0,"d":-560,"f":10400};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>