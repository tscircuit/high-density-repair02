"16.924999999999997" cx="354.5939027027026" cy="565.4054054054054" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-3.6" data-y="16.525" cx="354.5945945945945" cy="600" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.8" data-y="18" cx="250.81081081081078" cy="472.4324324324323" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.399992" data-y="18" cx="285.4060972972972" cy="472.4324324324323" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.399992" data-y="17.200000000000003" cx="285.4060972972972" cy="541.6216216216212" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.399992" data-y="16.924999999999997" cx="285.4060972972972" cy="565.4054054054054" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="-4.4" data-y="16.525" cx="285.4054054054053" cy="600" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":86.48648648648647,"c":0,"e":665.9459459459458,"b":0,"d":-86.48648648648647,"f":2029.1891891891887};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>