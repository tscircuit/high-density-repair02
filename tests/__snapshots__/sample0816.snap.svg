" data-label="" data-x="9.976725799387117" data-y="-13.986764068711928" cx="424.29962703782655" cy="483.64166603959416" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="6.023274200612882" data-y="-11.291484489160851" cx="215.70037296217345" cy="341.42838840796344" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="6.423274200612882" data-y="-11.200000000000001" cx="236.80590556971362" cy="336.6013162352923" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="6.8" data-y="-10.4" cx="256.68340217737966" cy="294.39025102021196" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="7.6" data-y="-9.6" cx="298.89446739245994" cy="252.17918580513168" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="7.6" data-y="-8.799999999999999" cx="298.89446739245994" cy="209.9681205900514" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="7.6" data-y="-7.999999999999999" cx="298.89446739245994" cy="167.75705537497117" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="8" data-y="-7.078700187280202" cx="320.00000000000006" cy="119.14574727827545" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="6.023274200612882" data-y="-15.256015510839148" cx="215.70037296217345" cy="550.6122352870526" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="6.423274200612882" data-y="-15.200000000000001" cx="236.80590556971362" cy="547.6566423106934" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="6.8" data-y="-14.4" cx="256.68340217737966" cy="505.4455770956132" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.6" data-y="-13.6" cx="298.89446739245994" cy="463.23451188053286" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="8.4" data-y="-13.6" cx="341.10553260754017" cy="463.23451188053286" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.200000000000001" data-y="-13.6" cx="383.31659782262045" cy="463.23451188053286" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="9.976725799387117" data-y="-13.986764068711928" cx="424.29962703782655" cy="483.64166603959416" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="6.023274200612882" data-y="-14" cx="215.70037296217345" cy="484.3400444880731" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.999999999999999" data-y="-11.635365604479249" cx="320" cy="359.5728736391377" r="3" fill="#0000FF"/></g><g><circle data-type="point" data-label="" data-x="7.999999999999999" data-y="-11.635365604479249" cx="320" cy="359.5728736391377" r="3" fill="#0ea5e9"/></g><g><circle data-type="point" data-label="" data-x="6.023274200612882" data-y="-14" cx="215.70037296217345" cy="484.3400444880731" r="3" fill="#0ea5e9"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":52.7638315188503,"c":0,"e":-102.11065215080237,"b":0,"d":-52.7638315188503,"f":-254.3535967758312};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>